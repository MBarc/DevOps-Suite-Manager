{% extends "base.html" %}
{% block title %}Credentials | DOSM{% endblock %}
{% block content %}
<header class="page-header">
  <div>
    <h1>{{ 'Edit credential profile' if cred else 'New credential profile' }}</h1>
  </div>
  <div class="actions">
    <a class="btn btn-ghost" href="{{ '/credentials/' + cred.id|string if cred else '/credentials' }}">Cancel</a>
  </div>
</header>

<section class="card card-narrow">
  {% if error %}
    <div class="badge badge-red" style="margin-bottom: var(--sp-3)">{{ error }}</div>
  {% endif %}
  <form method="post"
        action="{{ '/credentials/' + cred.id|string + '/edit' if cred else '/credentials/new' }}"
        class="stack">

    <label>Profile name
      <input type="text" name="name" required
             value="{{ cred.name if cred else '' }}"
             placeholder="prod-linux-admin" />
    </label>

    <label>Kind
      <select name="kind" id="kind-select">
        {% for k in kinds %}
        <option value="{{ k }}" {% if cred and cred.kind == k %}selected{% endif %}>
          {{ kind_labels[k] }}
        </option>
        {% endfor %}
      </select>
    </label>

    <label id="username-row">
      <span id="username-label">Username</span>
      <input type="text" name="username" id="username-input"
             value="{{ cred.username or '' if cred else '' }}"
             placeholder="e.g. svc-ops" />
    </label>

    <label id="domain-row">
      <span id="domain-label">Domain</span>
      <input type="text" name="domain" id="domain-input"
             value="{{ cred.domain or '' if cred else '' }}"
             placeholder="e.g. CORP (Windows domain for RDP)" />
    </label>

    <label>
      <span id="secret-label">Password</span>
      <input type="password" name="secret_value" autocomplete="off"
             id="secret-input"
             placeholder="{% if cred %}leave blank to keep current value{% else %}enter value{% endif %}" />
      <textarea name="secret_value" id="secret-textarea" rows="6" autocomplete="off"
                style="display:none; font-family:var(--font-mono); font-size:12px"
                placeholder='{% if cred %}leave blank to keep current{% else %}paste the service-account JSON{% endif %}'></textarea>
    </label>

    <div class="row" style="margin-top:var(--sp-2)">
      <button type="submit">{{ 'Save changes' if cred else 'Create profile' }}</button>
    </div>
  </form>
</section>

<script>
(function () {
  const kindSelect    = document.getElementById('kind-select');
  const usernameRow   = document.getElementById('username-row');
  const usernameLabel = document.getElementById('username-label');
  const usernameInput = document.getElementById('username-input');
  const domainRow     = document.getElementById('domain-row');
  const domainLabel   = document.getElementById('domain-label');
  const secretLabel   = document.getElementById('secret-label');
  const secretInput   = document.getElementById('secret-input');
  const secretArea    = document.getElementById('secret-textarea');

  const config = {
    login:    { showUser:true,  userLabel:'Username',           userReq:true,  showDomain:true,  domainLabel:'Domain',    secretLabel:'Password' },
    ssh_key:  { showUser:true,  userLabel:'SSH username',       userReq:true,  showDomain:false,                          secretLabel:'Private key (PEM)' },
    pat:      { showUser:true,  userLabel:'Username (optional)', userReq:false, showDomain:false,                         secretLabel:'Token' },
    azure_sp: { showUser:true,  userLabel:'Client ID (appId)',  userReq:true,  showDomain:true,  domainLabel:'Tenant ID', secretLabel:'Client secret' },
    aws_keys: { showUser:true,  userLabel:'Access key ID',      userReq:true,  showDomain:false,                          secretLabel:'Secret access key' },
    gcp_sa:   { showUser:false, userReq:false,                  showDomain:false,                 secretLabel:'Service account JSON', multiline:true },
  };

  function update() {
    const c = config[kindSelect.value];
    if (!c) return;
    usernameRow.style.display = c.showUser ? '' : 'none';
    usernameInput.required = c.showUser ? !!c.userReq : false;
    if (c.showUser) usernameLabel.textContent = c.userLabel;
    domainRow.style.display = c.showDomain ? '' : 'none';
    if (c.showDomain && domainLabel) domainLabel.textContent = c.domainLabel || 'Domain';
    secretLabel.textContent = c.secretLabel;
    // Swap the single-line secret <-> JSON textarea; disable the hidden one so
    // only one field (both named secret_value) is submitted.
    if (c.multiline) {
      secretInput.style.display = 'none'; secretInput.disabled = true;
      secretArea.style.display = '';      secretArea.disabled = false;
    } else {
      secretArea.style.display = 'none';  secretArea.disabled = true;
      secretInput.style.display = '';     secretInput.disabled = false;
    }
  }

  kindSelect.addEventListener('change', update);
  update();
})();
</script>
{% endblock %}
