{% extends "base.html" %}
{% block title %}Credentials | DOSM{% endblock %}
{% block content %}
<header class="page-header">
  <div>
    <h1>{{ 'Edit credential profile' if cred else 'New credential profile' }}</h1>
  </div>
  <div class="actions">
    <a class="btn btn-ghost" href="{{ '/credentials/' + cred.id|string if cred else '/credentials' }}">Cancel</a>
  </div>
</header>

<section class="card card-narrow">
  {% if error %}
    <div class="badge badge-red" style="margin-bottom: var(--sp-3)">{{ error }}</div>
  {% endif %}
  <form method="post"
        action="{{ '/credentials/' + cred.id|string + '/edit' if cred else '/credentials/new' }}"
        class="stack">

    <label>Profile name
      <input type="text" name="name" required
             value="{{ cred.name if cred else '' }}"
             placeholder="prod-linux-admin" />
    </label>

    <label>Kind
      <select name="kind" id="kind-select">
        {% for k in kinds %}
        <option value="{{ k }}" {% if cred and cred.kind == k %}selected{% endif %}>
          {{ kind_labels[k] }}
        </option>
        {% endfor %}
      </select>
    </label>

    <label id="username-row">
      <span id="username-label">Username</span>
      <input type="text" name="username" id="username-input"
             value="{{ cred.username or '' if cred else '' }}"
             placeholder="e.g. svc-ops" />
    </label>

    <label id="domain-row">
      Domain
      <input type="text" name="domain" id="domain-input"
             value="{{ cred.domain or '' if cred else '' }}"
             placeholder="e.g. CORP (Windows domain for RDP)" />
    </label>

    <label>
      <span id="secret-label">Password</span>
      <input type="password" name="secret_value" autocomplete="off"
             id="secret-input"
             placeholder="{% if cred %}leave blank to keep current value{% else %}enter value{% endif %}" />
    </label>

    <div class="row" style="margin-top:var(--sp-2)">
      <button type="submit">{{ 'Save changes' if cred else 'Create profile' }}</button>
    </div>
  </form>
</section>

<script>
(function () {
  const kindSelect    = document.getElementById('kind-select');
  const usernameRow   = document.getElementById('username-row');
  const usernameLabel = document.getElementById('username-label');
  const usernameInput = document.getElementById('username-input');
  const secretLabel   = document.getElementById('secret-label');
  const secretInput   = document.getElementById('secret-input');

  const domainRow = document.getElementById('domain-row');

  const config = {
    login:   { usernameLabel: 'Username', usernameRequired: true, showDomain: true,
               secretLabel: 'Password', secretPlaceholder: '{% if cred %}leave blank to keep current{% else %}enter password{% endif %}' },
    ssh_key: { usernameLabel: 'SSH username', usernameRequired: true, showDomain: false,
               secretLabel: 'Private key (PEM)', secretPlaceholder: '-----BEGIN ... KEY-----' },
    pat:     { usernameLabel: 'Username (optional)', usernameRequired: false, showDomain: false,
               secretLabel: 'Token', secretPlaceholder: '{% if cred %}leave blank to keep current{% else %}paste token{% endif %}' },
  };

  function update() {
    const c = config[kindSelect.value];
    if (!c) return;
    usernameLabel.textContent   = c.usernameLabel;
    usernameInput.required      = c.usernameRequired;
    usernameRow.style.display   = '';
    domainRow.style.display     = c.showDomain ? '' : 'none';
    secretLabel.textContent     = c.secretLabel;
    secretInput.placeholder     = c.secretPlaceholder;
  }

  kindSelect.addEventListener('change', update);
  update();
})();
</script>
{% endblock %}
