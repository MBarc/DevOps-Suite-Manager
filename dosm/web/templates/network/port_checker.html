{% extends "base.html" %}
{% block title %}Port Checker | DOSM{% endblock %}
{% block content %}
<header class="page-header">
  <div>
    <h1>Port Checker</h1>
    <div class="subtitle">Test if a port is reachable from a source host to a destination.</div>
  </div>
</header>

<div style="display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start">

  <section class="card">
    <h3 style="margin:0 0 16px;font-size:15px;font-weight:600">Run a check</h3>
    <form id="check-form">
      <div class="form-group">
        <label>Source host <span class="muted">(checks originate here)</span></label>
        <select name="source_host_id" required>
          <option value="">- select source -</option>
          {% for h in hosts %}
          <option value="{{ h.id }}">{{ h.name }} ({{ h.hostname }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Destination address</label>
        <div class="combo" id="dst-combo">
          <input type="text" name="dst_address" required autocomplete="off"
                 role="combobox" aria-expanded="false" aria-autocomplete="list"
                 placeholder="e.g. 192.168.1.10 or hostname">
          <div class="combo-menu" id="dst-menu" role="listbox" hidden>
            {% for h in hosts %}
            <button type="button" class="combo-item" role="option"
                    data-host="{{ h.hostname }}" data-port="{{ h.port or '' }}">
              <span class="combo-host">{{ h.hostname }}</span>
              <span class="combo-meta">{{ h.name }}{% if h.port %} · :{{ h.port }}{% endif %}</span>
            </button>
            {% endfor %}
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Port</label>
        <input type="number" name="port" min="1" max="65535" required placeholder="e.g. 443">
      </div>
      <button class="btn" type="submit" id="check-btn" style="width:100%">Check port</button>
    </form>
  </section>

  <section class="card" id="result-panel" style="display:none">
    <h3 style="margin:0 0 16px;font-size:15px;font-weight:600">Result</h3>
    <div id="result-body"></div>
  </section>

</div>

<section class="card" style="margin-top:20px" id="history-panel">
  <h3 style="margin:0 0 12px;font-size:14px;font-weight:600;color:var(--fg-muted,#a1a1aa)">Check history (this session)</h3>
  <div id="history-list" style="display:flex;flex-direction:column;gap:8px">
    <div class="muted" style="font-size:13px">No checks yet.</div>
  </div>
</section>

<style>
.form-group { margin-bottom:14px; }
.result-ok { display:flex;align-items:center;gap:12px;padding:16px;border-radius:8px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25) }
.result-fail { display:flex;align-items:center;gap:12px;padding:16px;border-radius:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25) }
.result-icon { font-size:28px;flex-shrink:0 }
.result-detail { font-size:13px;color:var(--fg-muted,#a1a1aa);margin-top:4px }
.hist-row { display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:var(--surface-raised,rgba(255,255,255,.04));font-size:13px }
.hist-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0 }
.hist-dot.ok { background:#22c55e }
.hist-dot.fail { background:#ef4444 }
.hist-dot.pending { background:#71717a }

/* Destination host combobox - DOSM-themed popover, native-datalist replacement */
.combo { position:relative }
.combo-menu {
  position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:30;
  max-height:240px; overflow-y:auto;
  background:var(--bg-elev-2); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:4px;
  box-shadow:0 12px 28px rgba(0,0,0,.45);
}
.combo-menu[hidden] { display:none }
.combo-item {
  display:flex; flex-direction:column; align-items:flex-start; gap:1px;
  width:100%; text-align:left; padding:7px 10px; border:none;
  background:transparent; border-radius:6px; cursor:pointer;
  color:var(--fg); font:inherit;
}
.combo-item[hidden] { display:none }
.combo-item:hover, .combo-item.active { background:var(--bg-elev-3); color:var(--fg-strong) }
.combo-host { font-size:13px }
.combo-meta { font-size:11px; color:var(--fg-dim) }
</style>

<script>
const history = [];

// Destination combobox: pick a registered host from the styled menu or type
// any ad-hoc address. Selecting a host pre-fills the port (only when empty,
// never overriding a value the user typed).
const dstInput = document.querySelector('[name=dst_address]');
const portInput = document.querySelector('[name=port]');
const combo = document.getElementById('dst-combo');
const menu = document.getElementById('dst-menu');
const items = Array.from(menu.querySelectorAll('.combo-item'));

function filterMenu() {
  const q = dstInput.value.trim().toLowerCase();
  let shown = 0;
  for (const it of items) {
    const hay = (it.dataset.host + ' ' + it.querySelector('.combo-meta').textContent).toLowerCase();
    const match = !q || hay.includes(q);
    it.hidden = !match;
    if (match) shown++;
  }
  return shown;
}
function openMenu() {
  if (!items.length || filterMenu() === 0) { closeMenu(); return; }
  menu.hidden = false;
  dstInput.setAttribute('aria-expanded', 'true');
}
function closeMenu() {
  menu.hidden = true;
  dstInput.setAttribute('aria-expanded', 'false');
  for (const it of items) it.classList.remove('active');
}
function pick(it) {
  dstInput.value = it.dataset.host;
  if (it.dataset.port && !portInput.value) portInput.value = it.dataset.port;
  closeMenu();
}

dstInput.addEventListener('focus', openMenu);
dstInput.addEventListener('input', openMenu);
// mousedown (not click) so selection wins before the input blurs.
for (const it of items) it.addEventListener('mousedown', (e) => { e.preventDefault(); pick(it); });
document.addEventListener('click', (e) => { if (!combo.contains(e.target)) closeMenu(); });
dstInput.addEventListener('keydown', (e) => {
  if (menu.hidden) return;
  const vis = items.filter(it => !it.hidden);
  let idx = vis.findIndex(it => it.classList.contains('active'));
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, vis.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); }
  else if (e.key === 'Enter' && idx >= 0) { e.preventDefault(); pick(vis[idx]); return; }
  else if (e.key === 'Escape') { closeMenu(); return; }
  else return;
  for (const it of vis) it.classList.remove('active');
  if (vis[idx]) { vis[idx].classList.add('active'); vis[idx].scrollIntoView({ block: 'nearest' }); }
});

document.getElementById('check-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.textContent = 'Checking…';

  const form = e.target;
  const body = new FormData(form);

  const srcSelect = form.querySelector('[name=source_host_id]');
  const srcLabel = srcSelect.options[srcSelect.selectedIndex]?.text || '?';
  const dst = form.querySelector('[name=dst_address]').value.trim();
  const port = form.querySelector('[name=port]').value;

  try {
    const res = await fetch('/network/port-checker/check', { method: 'POST', body });
    const data = await res.json();
    showResult(data, srcLabel);
    history.unshift({ data, srcLabel, ts: new Date() });
    renderHistory();
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Check port';
  }
});

function showResult(data, srcLabel) {
  const panel = document.getElementById('result-panel');
  const body = document.getElementById('result-body');
  panel.style.display = '';

  if (data.error) {
    body.innerHTML = `<div class="result-fail"><div class="result-icon">✗</div><div><strong>Error</strong><div class="result-detail">${esc(data.error)}</div></div></div>`;
    return;
  }

  const ok = data.reachable;
  const cls = ok ? 'result-ok' : 'result-fail';
  const icon = ok ? '✓' : '✗';
  const label = ok ? 'Reachable' : 'Unreachable';
  const latency = data.latency_ms != null ? `${data.latency_ms} ms` : '-';
  const errLine = data.error_msg ? `<div class="result-detail">Error: ${esc(data.error_msg)}</div>` : '';

  body.innerHTML = `
    <div class="${cls}">
      <div class="result-icon" style="color:${ok?'#22c55e':'#ef4444'}">${icon}</div>
      <div>
        <strong>${label}</strong>
        <div class="result-detail">
          From <code>${esc(srcLabel)}</code> to <code>${esc(data.dst_address)}:${data.port}</code> &nbsp;·&nbsp; Latency: ${latency}
        </div>
        ${errLine}
      </div>
    </div>`;
}

function showError(msg) {
  document.getElementById('result-panel').style.display = '';
  document.getElementById('result-body').innerHTML =
    `<div class="result-fail"><div class="result-icon">✗</div><div><strong>Request failed</strong><div class="result-detail">${esc(msg)}</div></div></div>`;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) { el.innerHTML = '<div class="muted" style="font-size:13px">No checks yet.</div>'; return; }
  el.innerHTML = history.map(h => {
    const ok = h.data.reachable;
    const dotCls = h.data.error ? 'pending' : (ok ? 'ok' : 'fail');
    const label = h.data.error ? 'error' : (ok ? 'open' : 'closed');
    const lat = h.data.latency_ms != null ? ` · ${h.data.latency_ms}ms` : '';
    return `<div class="hist-row">
      <div class="hist-dot ${dotCls}"></div>
      <div style="flex:1"><code>${esc(h.srcLabel)}</code> to <code>${esc(h.data.dst_address)}:${h.data.port}</code></div>
      <div style="color:${ok?'#22c55e':h.data.error?'#a1a1aa':'#ef4444'}">${label}${lat}</div>
      <div class="muted" style="font-size:11px">${h.ts.toLocaleTimeString()}</div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
{% endblock %}
