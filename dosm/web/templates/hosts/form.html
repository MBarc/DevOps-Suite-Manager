{% extends "base.html" %}
{% block title %}{{ 'Edit host' if host else 'Add host' }} - DOSM{% endblock %}
{% block content %}
<section class="panel panel-narrow">
  <h1>{{ 'Edit host' if host else 'Add host' }}</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post"
        action="{{ '/hosts/' + host.id|string + '/edit' if host else '/hosts/new' }}"
        class="stack">
    <label>Name
      <input type="text" name="name" required value="{{ host.name if host else '' }}" />
    </label>
    <label>Hostname / IP
      <input type="text" name="hostname" required value="{{ host.hostname if host else '' }}" />
    </label>
    <div class="row">
      <label>Protocol
        <select name="protocol" id="protocol-select">
          {% for p in protocols %}
          <option value="{{ p }}" {% if host and host.protocol == p %}selected{% elif not host and p == 'ssh' %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Port
        <input type="number" name="port" required value="{{ host.port if host else 22 }}" />
      </label>
    </div>
    <label>Credential
      <select name="credential_id">
        <option value="">(none)</option>
        {% for c in credentials %}
        <option value="{{ c.id }}"
          {% if host and host.credential_id == c.id %}selected{% endif %}>
          {{ c.name }} ({{ c.kind }})
        </option>
        {% endfor %}
      </select>
    </label>
    <label>Tags <span class="muted">(comma-separated)</span>
      <input type="text" name="tags"
        value="{{ host.tags|map(attribute='name')|join(', ') if host else '' }}" />
    </label>
    <label>Description
      <textarea name="description" rows="3">{{ host.description or '' if host else '' }}</textarea>
    </label>
    <div class="row">
      <button type="submit">{{ 'Save' if host else 'Create' }}</button>
      <a href="{{ '/hosts/' + host.id|string if host else '/hosts' }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</section>
<script>
  const defaults = {{ default_ports|tojson }};
  const sel = document.getElementById('protocol-select');
  const portInput = document.querySelector('input[name="port"]');
  sel?.addEventListener('change', () => {
    if (defaults[sel.value]) portInput.value = defaults[sel.value];
  });
</script>
{% endblock %}
