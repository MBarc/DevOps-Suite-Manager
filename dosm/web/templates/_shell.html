<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}DOSM{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e1e2e'/><text x='3' y='24' font-family='monospace' font-size='18' font-weight='700' fill='%236366f1'>&gt;_</text></svg>" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/app.css" />
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  <style>
    /* ── Credential searchable combobox ──────────────────────────────────── */
    .cred-combo { position: relative; display: block; }

    /* Input wrapper — holds the text input + chevron icon */
    .cred-input-wrap { position: relative; }
    .cred-combo-input {
      width: 100%; box-sizing: border-box;
      padding-right: 28px; /* room for chevron */
    }
    .cred-chevron {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--fg-muted, #71717a);
      transition: transform 0.15s ease;
    }
    .cred-combo-input[aria-expanded="true"] ~ .cred-chevron {
      transform: translateY(-50%) rotate(180deg);
    }

    /* Dropdown list */
    .cred-combo-list {
      position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 300;
      background: var(--surface, #18181b);
      border: 1px solid var(--border, #3f3f46);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      max-height: 232px; overflow-y: auto;
      padding: 4px 0;
    }
    .cred-combo-list[hidden] { display: none; }

    /* Separator between (none) and credential list */
    .cred-combo-sep { height: 1px; background: var(--border, #3f3f46); margin: 4px 0; }

    .cred-combo-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; cursor: pointer; font-size: 13px;
      color: var(--fg, #e4e4e7);
      white-space: nowrap; overflow: hidden;
    }
    .cred-combo-option:hover,
    .cred-combo-option.cco-focused {
      background: var(--surface-raised, rgba(255,255,255,.06));
      color: var(--fg-strong, #fff);
    }
    /* Checkmark column — always reserves space so text stays aligned */
    .cred-combo-option::before {
      content: ''; display: inline-block; width: 14px; flex-shrink: 0;
    }
    .cred-combo-option[aria-selected="true"]::before { content: '✓'; color: var(--accent, #6366f1); }
    .cred-combo-option .cco-label { overflow: hidden; text-overflow: ellipsis; }
    .cco-none { color: var(--fg-muted, #71717a); font-style: italic; }
    .cred-combo-empty { padding: 8px 12px; font-size: 13px; color: var(--fg-muted, #71717a); }

    /* Current-selection badge shown below the input */
    .cred-current {
      display: none; /* JS sets display:flex when a credential is selected */
      align-items: center; gap: 6px;
      margin-top: 5px;
    }
    .cred-current-label { font-size: 11px; color: var(--fg-muted, #71717a); flex-shrink: 0; }
    .cred-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface-raised, rgba(255,255,255,.05));
      border: 1px solid var(--border, #3f3f46);
      border-radius: 4px; padding: 2px 4px 2px 8px;
      font-size: 12px; color: var(--fg, #e4e4e7);
      max-width: 100%; min-width: 0;
    }
    .cred-badge-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cred-badge-clear {
      background: none; border: none; line-height: 1; padding: 1px 3px;
      color: var(--fg-muted, #71717a); cursor: pointer; border-radius: 3px;
      font-size: 15px; flex-shrink: 0;
    }
    .cred-badge-clear:hover { color: var(--fg, #e4e4e7); background: rgba(255,255,255,.08); }
  </style>

  <script>
    (function () {
      const CHEVRON_SVG = '<svg class="cred-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

      class CredCombo {
        constructor(select) {
          this.select = select;
          this.opts = [...select.options].map(o => ({ value: o.value, label: o.text }));
          this.focusIdx = -1;
          this._build();
        }

        _build() {
          const wrap = document.createElement('div');
          wrap.className = 'cred-combo';
          if (this.select.style.cssText) wrap.style.cssText = this.select.style.cssText;

          this.select.parentNode.insertBefore(wrap, this.select);
          wrap.appendChild(this.select);
          this.select.style.display = 'none';

          // Input wrapper (holds text field + chevron)
          const inputWrap = document.createElement('div');
          inputWrap.className = 'cred-input-wrap';

          this.input = document.createElement('input');
          this.input.type = 'text';
          this.input.className = 'cred-combo-input';
          this.input.placeholder = 'Search credentials…';
          this.input.autocomplete = 'off';
          this.input.setAttribute('role', 'combobox');
          this.input.setAttribute('aria-autocomplete', 'list');
          this.input.setAttribute('aria-expanded', 'false');

          inputWrap.appendChild(this.input);
          inputWrap.insertAdjacentHTML('beforeend', CHEVRON_SVG);

          // Dropdown
          this.list = document.createElement('div');
          this.list.className = 'cred-combo-list';
          this.list.setAttribute('hidden', '');
          this.list.setAttribute('role', 'listbox');

          // Selected-value badge
          this.currentEl = document.createElement('div');
          this.currentEl.className = 'cred-current';

          wrap.appendChild(inputWrap);
          wrap.appendChild(this.list);
          wrap.appendChild(this.currentEl);

          this._updateBadge();

          this.input.addEventListener('focus', () => this._open());
          this.input.addEventListener('input', () => {
            this.focusIdx = -1;
            this._renderList(this.input.value);
            this._showList();
          });
          this.input.addEventListener('keydown', e => this._keydown(e));
          this.input.addEventListener('blur', () => {
            setTimeout(() => {
              if (!wrap.contains(document.activeElement)) this._close();
            }, 150);
          });
        }

        /* Show the current selection as a removable badge below the input */
        _updateBadge() {
          const cur = this.opts.find(o => o.value === this.select.value);
          if (!cur || cur.value === '') {
            this.currentEl.style.display = 'none';
            this.currentEl.innerHTML = '';
          } else {
            this.currentEl.style.display = 'flex';
            this.currentEl.innerHTML =
              '<span class="cred-current-label">Selected:</span>' +
              '<span class="cred-badge">' +
                '<span class="cred-badge-text" title="' + cur.label.replace(/"/g, '&quot;') + '">' + cur.label + '</span>' +
                '<button type="button" class="cred-badge-clear" title="Clear selection" aria-label="Clear credential">×</button>' +
              '</span>';
            this.currentEl.querySelector('.cred-badge-clear').addEventListener('click', () => {
              const none = this.opts.find(o => o.value === '');
              if (none) this._pick(none);
            });
          }
        }

        _showList() {
          this.list.removeAttribute('hidden');
          this.input.setAttribute('aria-expanded', 'true');
        }

        _open() {
          this.focusIdx = -1;
          this._renderList('');
          this._showList();
          /* Scroll the currently selected item into view after paint */
          const sel = this.list.querySelector('[aria-selected="true"]');
          if (sel) requestAnimationFrame(() => sel.scrollIntoView({ block: 'nearest' }));
        }

        _close() {
          this.list.setAttribute('hidden', '');
          this.input.setAttribute('aria-expanded', 'false');
          this.input.value = ''; /* always clear — input is a search tool, not a value display */
          this.focusIdx = -1;
        }

        _renderList(q) {
          const term = (q || '').toLowerCase().trim();
          const noneOpt  = this.opts.find(o => o.value === '');
          const credOpts = this.opts.filter(o => o.value !== '');
          const filtered = term ? credOpts.filter(o => o.label.toLowerCase().includes(term)) : credOpts;

          this.list.innerHTML = '';

          /* (none) always pinned at the top */
          if (noneOpt) this._addItem(noneOpt);

          /* Separator */
          const sep = document.createElement('div');
          sep.className = 'cred-combo-sep';
          this.list.appendChild(sep);

          if (!filtered.length && term) {
            const empty = document.createElement('div');
            empty.className = 'cred-combo-empty';
            empty.textContent = 'No credentials match “' + q + '”';
            this.list.appendChild(empty);
          } else {
            filtered.forEach(o => this._addItem(o));
          }
        }

        _addItem(o) {
          const item = document.createElement('div');
          item.className = 'cred-combo-option' + (o.value === '' ? ' cco-none' : '');
          item.setAttribute('role', 'option');
          item.dataset.value = o.value;
          if (o.value === this.select.value) item.setAttribute('aria-selected', 'true');
          const label = document.createElement('span');
          label.className = 'cco-label';
          label.textContent = o.label;
          label.title = o.label;
          item.appendChild(label);
          item.addEventListener('mousedown', e => { e.preventDefault(); this._pick(o); });
          this.list.appendChild(item);
        }

        _pick(o) {
          this.select.value = o.value;
          this.select.dispatchEvent(new Event('change', { bubbles: true }));
          this._updateBadge();
          this._close();
        }

        _items() {
          return [...this.list.querySelectorAll('.cred-combo-option')];
        }

        _setFocus(idx) {
          const items = this._items();
          if (!items.length) return;
          this.focusIdx = Math.max(0, Math.min(idx, items.length - 1));
          items.forEach((el, i) => {
            el.classList.toggle('cco-focused', i === this.focusIdx);
            if (i === this.focusIdx) el.scrollIntoView({ block: 'nearest' });
          });
        }

        _keydown(e) {
          const open = !this.list.hasAttribute('hidden');
          if (e.key === 'Escape') { if (open) this._close(); return; }
          if (!open) {
            if (['ArrowDown', 'ArrowUp', 'Enter'].includes(e.key)) { e.preventDefault(); this._open(); }
            return;
          }
          if (e.key === 'ArrowDown') { e.preventDefault(); this._setFocus(this.focusIdx + 1); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); this._setFocus(this.focusIdx - 1); }
          else if (e.key === 'Enter') {
            e.preventDefault();
            const items = this._items();
            const target = this.focusIdx >= 0 ? items[this.focusIdx]
              : items.length === 1 ? items[0] : null;
            if (target) {
              const o = this.opts.find(opt => opt.value === target.dataset.value);
              if (o) this._pick(o);
            }
          }
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('select[name="credential_id"]').forEach(sel => {
          if (!sel.closest('.cred-combo')) new CredCombo(sel);
        });
      });
    }());

    // `/` focuses the first search-style input on the page.
    document.addEventListener('keydown', (e) => {
      if (e.key !== '/') return;
      const active = document.activeElement;
      if (active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)) return;
      const target = document.querySelector('input[type="search"], input[name="q"]');
      if (target) { e.preventDefault(); target.focus(); target.select(); }
    });
  </script>
</body>
</html>
