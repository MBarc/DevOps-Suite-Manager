services:

  # ── DOSM ────────────────────────────────────────────────────────────────
  dosm:
    build: .
    restart: unless-stopped
    ports:
      - "${DOSM_PORT:-8765}:8765"
    volumes:
      # Bind-mount so config, DB, secrets, and docs survive rebuilds and are
      # readable from the host (needed by setup-guacamole scripts).
      - ./dosm-home:/dosm-home
    environment:
      DOSM_HOME: /dosm-home
      # Set a strong password here before first boot.  The entrypoint creates
      # the admin account on first run; subsequent runs ignore this variable.
      DOSM_ADMIN_PASSWORD: ${DOSM_ADMIN_PASSWORD:-changeme}
    networks: [guac]
    depends_on: [guacd]

  # ── Guacamole stack ──────────────────────────────────────────────────────
  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    networks: [guac]

  guacamole-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?run scripts/setup-guacamole}
    volumes:
      - guac-db:/var/lib/postgresql/data
      - ./guacamole/initdb:/docker-entrypoint-initdb.d:ro
    networks: [guac]

  guacamole:
    build: ./guacamole
    restart: unless-stopped
    depends_on: [guacd, guacamole-db]
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: guacamole-db
      POSTGRES_DATABASE: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?run scripts/setup-guacamole}
      JSON_SECRET_KEY: ${GUACAMOLE_JSON_SECRET_KEY:?run scripts/setup-guacamole}
      JSON_TRUSTED_NETWORKS: ${GUACAMOLE_JSON_TRUSTED_NETWORKS:-127.0.0.1,::1,172.16.0.0/12}
    ports:
      - "${GUACAMOLE_PORT:-8080}:8080"
    volumes:
      - ./dosm-home/data/guacamole_recordings:/recordings
    networks: [guac]

networks:
  guac:

volumes:
  guac-db:
