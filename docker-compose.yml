services:
  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    networks: [guac]

  guacamole-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?run scripts/setup-guacamole to generate .env}
    volumes:
      - guac-db:/var/lib/postgresql/data
      - ./guacamole/initdb:/docker-entrypoint-initdb.d:ro
    networks: [guac]

  guacamole:
    build: ./guacamole
    restart: unless-stopped
    depends_on: [guacd, guacamole-db]
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: guacamole-db
      POSTGRES_DATABASE: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?run scripts/setup-guacamole to generate .env}
      # Passed to docker-entrypoint.sh which appends these to guacamole.properties
      # after start.sh generates it.  Run `dosm guacamole keygen` to get the value.
      JSON_SECRET_KEY: ${GUACAMOLE_JSON_SECRET_KEY:?run scripts/setup-guacamole to generate .env}
      JSON_TRUSTED_NETWORKS: ${GUACAMOLE_JSON_TRUSTED_NETWORKS:-127.0.0.1,::1,172.16.0.0/12}
    ports:
      - "${GUACAMOLE_PORT:-8080}:8080"
    volumes:
      - ${GUACAMOLE_RECORDINGS_HOST_DIR:-./.dosm-home/data/guacamole_recordings}:/recordings
    networks: [guac]

networks:
  guac:

volumes:
  guac-db:
