services:

  # ── DOSM ────────────────────────────────────────────────────────────────
  dosm:
    build: .
    restart: unless-stopped
    ports:
      - "${DOSM_PORT:-8765}:8765"
    volumes:
      # Bind-mount so config, DB, secrets, and docs survive rebuilds and are
      # readable from the host (needed by setup-guacamole scripts).
      - ./dosm-home:/dosm-home
    environment:
      DOSM_HOME: /dosm-home
      DOSM_ADMIN_PASSWORD: ${DOSM_ADMIN_PASSWORD:-changeme}
      # Browser-facing Guacamole URL used for the iframe — must be reachable
      # from the user's browser, not from inside Docker.
      GUACAMOLE_PUBLIC_URL: ${GUACAMOLE_PUBLIC_URL:-http://localhost:8888/guacamole}
      # LLM model to use — must match what you want Ollama to serve.
      DOSM_LLM_MODEL: ${DOSM_LLM_MODEL:-qwen2.5:3b-instruct}
    # Let DOSM reach the Docker host (and host-published services) via
    # host.docker.internal — e.g. to register the host machine as a host entry
    # for SSH/SFTP. Automatic on Docker Desktop; required on native Linux Docker.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [guac]
    depends_on: [guacd, ollama]

  # ── Ollama (local LLM) ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks: [guac]
    # Exposed on a non-default port to avoid conflict with a host Ollama install.
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Guacamole stack ──────────────────────────────────────────────────────
  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    # Resolve `host.docker.internal` from inside guacd uniformly across
    # Docker Desktop (Win/Mac) and native Linux Docker. Needed when DOSM
    # runs on the host (not in this compose stack) and guacd has to reach
    # DOSM's jump-tunnel listener via the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [guac]

  guacamole-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?run scripts/setup-guacamole}
    volumes:
      - guac-db:/var/lib/postgresql/data
      - ./guacamole/initdb:/docker-entrypoint-initdb.d:ro
    networks: [guac]

  guacamole:
    build: ./guacamole
    restart: unless-stopped
    depends_on: [guacd, guacamole-db]
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: guacamole-db
      POSTGRES_DATABASE: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?run scripts/setup-guacamole}
      JSON_SECRET_KEY: ${GUACAMOLE_JSON_SECRET_KEY:?run scripts/setup-guacamole}
      JSON_TRUSTED_NETWORKS: ${GUACAMOLE_JSON_TRUSTED_NETWORKS:-127.0.0.1,::1,172.16.0.0/12}
    ports:
      - "${GUACAMOLE_PORT:-8888}:8080"
    volumes:
      - ./dosm-home/data/guacamole_recordings:/recordings
    networks: [guac]

networks:
  guac:

volumes:
  guac-db:
  ollama-data:
