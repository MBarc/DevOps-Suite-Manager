name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check dosm/ tests/

      - name: CLI docs are up to date
        run: |
          python scripts/gen_cli_docs.py
          if ! git diff --exit-code docs/cli/_generated/; then
            echo "::error::docs/cli/_generated/ is out of sync with dosm/cli.py."
            echo "Run: python scripts/gen_cli_docs.py && git add docs/cli/_generated/"
            exit 1
          fi

      - name: Run tests
        run: pytest tests/ -v --tb=short
