name: Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dosm
            context: .
            file: Dockerfile
          - image: dosm-guacamole
            context: ./guacamole
            file: guacamole/Dockerfile
          - image: dosm-guacamole-db
            context: ./guacamole
            file: guacamole/db.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image tag (date + short SHA)
        run: echo "TAG=$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/mbarc/${{ matrix.image }}:latest
            ghcr.io/mbarc/${{ matrix.image }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
